workflows:
  ios-workflow:
    name: ATHLYTIX iOS
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          cd athlytix
          flutter pub get
      - name: Install pods
        script: |
          cd athlytix/ios
          pod install
      - name: Build iOS
        script: |
          cd athlytix
          flutter build ios --release --no-codesign
    artifacts:
      - athlytix/build/ios/iphoneos/*.app
