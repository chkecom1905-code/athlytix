workflows:
  ios-workflow:
    name: ATHLYTIX iOS
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.athlytix.athlytix
    scripts:
      - name: Install dependencies
        script: |
          cd athlytix
          flutter pub get
      - name: Regenerate iOS folder
        script: |
          cd athlytix
          flutter create --platforms=ios .
      - name: Set bundle ID
        script: |
          cd athlytix/ios
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.athlytix.athlytix" Runner/Info.plist
      - name: Install pods
        script: |
          cd athlytix/ios
          pod install --repo-update
      - name: Build IPA
        script: |
          cd athlytix
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - athlytix/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
