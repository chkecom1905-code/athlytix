workflows:
  ios-workflow:
    name: ATHLYTIX iOS
    max_build_duration: 120
    integrations:
      app_store_connect: Cheikh Sarr
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          cd athlytix
          flutter pub get
      - name: Regenerate iOS folder
        script: |
          cd athlytix
          flutter create --platforms=ios .
      - name: Install pods
        script: |
          cd athlytix/ios
          pod install --repo-update
      - name: Initialize keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files com.athlytix.athlytix \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing
        script: xcode-project use-profiles --warn-only
      - name: Build IPA
        script: |
          cd athlytix
          flutter build ipa --release
    artifacts:
      - athlytix/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
