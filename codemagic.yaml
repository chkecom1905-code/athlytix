workflows:
  ios-workflow:
    name: BALLVYN iOS
    max_build_duration: 120
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.athlytix.athlytix
    scripts:
      - name: Install dependencies
        script: |
          cd athlytix
          flutter pub get

      - name: Generate app icons
        script: |
          cd athlytix
          dart run flutter_launcher_icons

      - name: Regenerate iOS folder
        script: |
          cd athlytix
          flutter create --platforms=ios .

      - name: Patch Podfile with privacy manifests
        script: |
          python3 << 'EOF'
          podfile_path = 'athlytix/ios/Podfile'
          with open(podfile_path, 'r') as f:
              content = f.read()

          injection = """
            # Inject PrivacyInfo.xcprivacy for SDKs missing it
            privacy_content = <<~PLIST
              <?xml version="1.0" encoding="UTF-8"?>
              <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
              <plist version="1.0">
              <dict>
                <key>NSPrivacyTracking</key>
                <false/>
                <key>NSPrivacyCollectedDataTypes</key>
                <array/>
                <key>NSPrivacyAccessedAPITypes</key>
                <array/>
              </dict>
              </plist>
            PLIST
            ['GTMSessionFetcher', 'GoogleToolboxForMac'].each do |pod_name|
              installer.pods_project.targets.each do |target|
                next unless target.name == pod_name
                pod_path = installer.sandbox.pod_dir(pod_name).to_s
                privacy_file = File.join(pod_path, 'PrivacyInfo.xcprivacy')
                File.write(privacy_file, privacy_content)
                group = installer.pods_project.main_group.find_subpath(pod_name, true)
                ref = group.new_file(privacy_file)
                target.resources_build_phase.add_file_reference(ref)
                puts "Added PrivacyInfo.xcprivacy to #{pod_name}"
              end
            end
          """

          patched = content.replace(
              'post_install do |installer|',
              'post_install do |installer|' + injection,
              1
          )

          with open(podfile_path, 'w') as f:
              f.write(patched)

          print("Podfile patched successfully")
          EOF

      - name: Install pods
        script: |
          cd athlytix/ios
          pod install --repo-update

      - name: Initialize keychain
        script: keychain initialize

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set up profiles
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          cd athlytix
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - athlytix/build/ios/ipa/*.ipa
      - athlytix/build/ios/archive/*.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
