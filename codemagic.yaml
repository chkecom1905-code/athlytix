workflows:
  ios-workflow:
    name: ATHLYTIX iOS
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.athlytix.app
    scripts:
      - name: Install dependencies
        script: |
          cd athlytix
          flutter pub get
      - name: Regenerate iOS folder
        script: |
          cd athlytix
          flutter create --platforms=ios .
      - name: Install pods
        script: |
          cd athlytix/ios
          pod install --repo-update
      - name: Build iOS
        script: |
          cd athlytix
          flutter build ipa --release
    artifacts:
      - athlytix/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
