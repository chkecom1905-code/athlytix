workflows:
  ios-workflow:
    name: BALLVYN iOS
    max_build_duration: 120
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.athlytix.athlytix
    scripts:
      - name: Install dependencies
        script: |
          cd athlytix
          flutter pub get

      - name: Regenerate iOS folder
        script: |
          cd athlytix
          flutter create --platforms=ios .

      - name: Create AppIcon folder and generate icons
        script: |
          pip3 install Pillow --quiet
          cd athlytix
          mkdir -p ios/Runner/Assets.xcassets/AppIcon.appiconset
          cat > ios/Runner/Assets.xcassets/AppIcon.appiconset/Contents.json << 'JSON'
          {
            "images": [
              {"size": "20x20", "idiom": "iphone", "scale": "2x", "filename": "Icon-App-20x20@2x.png"},
              {"size": "20x20", "idiom": "iphone", "scale": "3x", "filename": "Icon-App-20x20@3x.png"},
              {"size": "29x29", "idiom": "iphone", "scale": "2x", "filename": "Icon-App-29x29@2x.png"},
              {"size": "29x29", "idiom": "iphone", "scale": "3x", "filename": "Icon-App-29x29@3x.png"},
              {"size": "40x40", "idiom": "iphone", "scale": "2x", "filename": "Icon-App-40x40@2x.png"},
              {"size": "40x40", "idiom": "iphone", "scale": "3x", "filename": "Icon-App-40x40@3x.png"},
              {"size": "60x60", "idiom": "iphone", "scale": "2x", "filename": "Icon-App-60x60@2x.png"},
              {"size": "60x60", "idiom": "iphone", "scale": "3x", "filename": "Icon-App-60x60@3x.png"},
              {"size": "20x20", "idiom": "ipad", "scale": "1x", "filename": "Icon-App-20x20@1x.png"},
              {"size": "20x20", "idiom": "ipad", "scale": "2x", "filename": "Icon-App-20x20@2x.png"},
              {"size": "29x29", "idiom": "ipad", "scale": "1x", "filename": "Icon-App-29x29@1x.png"},
              {"size": "29x29", "idiom": "ipad", "scale": "2x", "filename": "Icon-App-29x29@2x.png"},
              {"size": "40x40", "idiom": "ipad", "scale": "1x", "filename": "Icon-App-40x40@1x.png"},
              {"size": "40x40", "idiom": "ipad", "scale": "2x", "filename": "Icon-App-40x40@2x.png"},
              {"size": "76x76", "idiom": "ipad", "scale": "1x", "filename": "Icon-App-76x76@1x.png"},
              {"size": "76x76", "idiom": "ipad", "scale": "2x", "filename": "Icon-App-76x76@2x.png"},
              {"size": "83.5x83.5", "idiom": "ipad", "scale": "2x", "filename": "Icon-App-83.5x83.5@2x.png"},
              {"size": "1024x1024", "idiom": "ios-marketing", "scale": "1x", "filename": "Icon-App-1024x1024@1x.png"}
            ],
            "info": {"version": 1, "author": "xcode"}
          }
          JSON
          python3 << 'PYEOF'
          from PIL import Image
          import os

          src = 'assets/icon.png'
          dest = 'ios/Runner/Assets.xcassets/AppIcon.appiconset'
          sizes = [
            ('Icon-App-20x20@1x.png', 20), ('Icon-App-20x20@2x.png', 40), ('Icon-App-20x20@3x.png', 60),
            ('Icon-App-29x29@1x.png', 29), ('Icon-App-29x29@2x.png', 58), ('Icon-App-29x29@3x.png', 87),
            ('Icon-App-40x40@1x.png', 40), ('Icon-App-40x40@2x.png', 80), ('Icon-App-40x40@3x.png', 120),
            ('Icon-App-60x60@2x.png', 120), ('Icon-App-60x60@3x.png', 180),
            ('Icon-App-76x76@1x.png', 76), ('Icon-App-76x76@2x.png', 152),
            ('Icon-App-83.5x83.5@2x.png', 167), ('Icon-App-1024x1024@1x.png', 1024),
          ]
          img = Image.open(src).convert('RGB')
          for name, size in sizes:
            img.resize((size, size), Image.LANCZOS).save(os.path.join(dest, name))
            print(f'Generated {name}')
          print('All icons generated!')
          PYEOF

      - name: Patch Podfile with privacy manifests
        script: |
          python3 << 'EOF'
          podfile_path = 'athlytix/ios/Podfile'
          with open(podfile_path, 'r') as f:
              content = f.read()

          injection = """
            privacy_content = <<~PLIST
              <?xml version="1.0" encoding="UTF-8"?>
              <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
              <plist version="1.0">
              <dict>
                <key>NSPrivacyTracking</key>
                <false/>
                <key>NSPrivacyCollectedDataTypes</key>
                <array/>
                <key>NSPrivacyAccessedAPITypes</key>
                <array/>
              </dict>
              </plist>
            PLIST
            ['GTMSessionFetcher', 'GoogleToolboxForMac'].each do |pod_name|
              installer.pods_project.targets.each do |target|
                next unless target.name == pod_name
                pod_path = installer.sandbox.pod_dir(pod_name).to_s
                privacy_file = File.join(pod_path, 'PrivacyInfo.xcprivacy')
                File.write(privacy_file, privacy_content)
                group = installer.pods_project.main_group.find_subpath(pod_name, true)
                ref = group.new_file(privacy_file)
                target.resources_build_phase.add_file_reference(ref)
                puts "Added PrivacyInfo.xcprivacy to #{pod_name}"
              end
            end
          """

          patched = content.replace(
              'post_install do |installer|',
              'post_install do |installer|' + injection,
              1
          )

          with open(podfile_path, 'w') as f:
              f.write(patched)

          print("Podfile patched successfully")
          EOF

      - name: Install pods
        script: |
          cd athlytix/ios
          pod install --repo-update

      - name: Initialize keychain
        script: keychain initialize

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set up profiles
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          cd athlytix
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - athlytix/build/ios/ipa/*.ipa
      - athlytix/build/ios/archive/*.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
