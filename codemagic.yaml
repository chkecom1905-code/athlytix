workflows:
  ios-workflow:
    name: ATHLYTIX iOS
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          cd athlytix
          flutter pub get
      - name: Regenerate iOS folder
        script: |
          cd athlytix
          flutter create --platforms=ios .
      - name: Install pods
        script: |
          cd athlytix/ios
          pod install --repo-update
      - name: Build iOS
        script: |
          cd athlytix/ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=U3XBJL6T8W \
            clean build
    artifacts:
      - "**/*.app"
