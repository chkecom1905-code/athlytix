workflows:
  ios-release:
    name: BALLVYN iOS Release
    max_build_duration: 90
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: 7L83WSQ64K
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.athlytix.athlytix
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $FCI_BUILD_DIR/athlytix/ios/Pods
    scripts:
      - name: Flutter pub get
        script: cd athlytix && flutter pub get
      - name: Créer la plateforme iOS
        script: cd athlytix && flutter create --platforms=ios .
      - name: Pod install
        script: |
          cd athlytix/ios
          pod repo update
          pod install --repo-update
      - name: Setup keychain
        script: keychain initialize
      - name: Ajouter certificats
        script: keychain add-certificates
      - name: Profils de provisioning
        script: xcode-project use-profiles
      - name: Build IPA
        script: cd athlytix && flutter build ipa --release
    artifacts:
      - athlytix/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - cheisamasama@gmail.com
        notify:
          success: true
          failure: true
