name: athlytix
description: BALLVYN - Train Like A Pro. Basketball training app with AI coaching.
version: 1.0.7+7
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  in_app_purchase: ^3.1.13
  http: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_animate: ^4.5.0
  google_mlkit_pose_detection: ^0.10.0
  camera: ^0.10.5+9
  permission_handler: ^11.3.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
